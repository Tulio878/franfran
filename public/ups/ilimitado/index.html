  <body>
    <div id="root"></div>
    <script>
      // Capture & forward all URL params across upsell pages
      (function(){
        var KEY="utm_params";
        function getStored(){try{return JSON.parse(localStorage.getItem(KEY)||"{}")}catch(e){return{}}}
        function getQs(){var s=getStored();var qs=new URLSearchParams(s).toString();return qs}
        function appendQs(url){var qs=getQs();if(!qs)return url;var sep=url.indexOf("?")>-1?"&":"?";return url+sep+qs}
        // Capture incoming params
        try{
          var params=new URLSearchParams(window.location.search);
          var existing=getStored();
          params.forEach(function(v,k){existing[k]=v});
          if(Object.keys(existing).length)localStorage.setItem(KEY,JSON.stringify(existing));
        }catch(e){}
        // Intercept <a> clicks
        document.addEventListener("click",function(e){
          var a=e.target.closest("a[href]");
          if(!a)return;
          var href=a.getAttribute("href");
          if(!href||href.startsWith("http")||href.startsWith("mailto")||href.startsWith("#"))return;
          a.setAttribute("href",appendQs(href));
        },true);
        // Intercept pushState/replaceState (React Router)
        var origPush=history.pushState.bind(history);
        var origReplace=history.replaceState.bind(history);
        history.pushState=function(s,t,u){if(u&&typeof u==="string")u=appendQs(u);return origPush(s,t,u)};
        history.replaceState=function(s,t,u){if(u&&typeof u==="string")u=appendQs(u);return origReplace(s,t,u)};
      })();
    </script>
